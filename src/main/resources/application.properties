# Database
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/ecommerce}

# JWT
jwt.secret=${JWT_SECRET:default-jwt-secret-for-local-dev-only}
jwt.expiration=86400000

# Paystack
paystack.secret.key=${PAYSTACK_SECRET_KEY:sk_test_dummy}

# File uploads
file.upload-dir=uploads
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# Mail (defaults allow app to start locally without env vars)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:25}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:false}

# Port
server.port=${PORT:8080}